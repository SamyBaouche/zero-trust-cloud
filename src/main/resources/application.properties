# Name of the application (used internally by Spring)
spring.application.name=auth-service

# Port where the application will run
server.port=8081

# Database connection URL (PostgreSQL running in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/zero_trust_cloud

# Database username
spring.datasource.username=postgres

# Database password
spring.datasource.password=postgres

# Automatically update database schema based on entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Specify PostgreSQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect