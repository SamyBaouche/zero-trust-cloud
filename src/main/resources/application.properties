spring.application.name=auth-service

server.port=${PORT:5000}

# Render provides these env vars in production; local dev falls back to .env.example defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zero_trust_cloud}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Bouteflika2012}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HTTPS cookie defaults (effective if/when session cookies are used)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

